command:
  executable: claude
  prompt_flag: -p
  args:
    - >-
      --dangerously-skip-permissions
      --disallowedTools "AskUserQuestion"
      --append-system-prompt "you cannot ask questions to the user. so,
      whenever you think you should get human feedback, just write under
      REQUESTS\AI. Human will see this after you finish this step.
      (**So you cannot directly ask nor get human feedback in this session.**)"

steps:
  - name: split_plan
    prompt: /split_plan

  - name: imple_plan
    prompt: /imple_plan

  - name: wrap_up
    prompt: /wrap_up

  - name: write_current
    prompt: /write_current

  - name: retrospective
    prompt: /retrospective
