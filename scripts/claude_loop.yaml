# NOTE: --workflow auto uses steps[1:] of this file. steps[0] must be /issue_plan.
#       The `command` / `defaults` sections must stay in sync with
#       claude_loop_quick.yaml, claude_loop_research.yaml,
#       claude_loop_issue_plan.yaml, claude_loop_scout.yaml,
#       and claude_loop_question.yaml.
#       Allowed `defaults`/`steps[]` override keys (string-typed):
#         model, effort, system_prompt, append_system_prompt

command:
  executable: claude
  prompt_flag: -p
  args:
    - --dangerously-skip-permissions
    - --disallowedTools "AskUserQuestion"

defaults:
  model: sonnet
  effort: medium

steps:
  - name: issue_plan
    prompt: /issue_plan
    model: opus
    effort: high

  - name: split_plan
    prompt: /split_plan
    model: opus
    effort: high

  - name: imple_plan
    prompt: /imple_plan
    model: opus
    effort: high

  - name: wrap_up
    prompt: /wrap_up
    continue: true

  - name: write_current
    prompt: /write_current
    effort: high

  - name: retrospective
    prompt: /retrospective
    model: opus
