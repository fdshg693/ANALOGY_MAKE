# NOTE: 1-step YAML for running /issue_plan alone. Also used as phase 1 of --workflow auto.
#       The `command` / `defaults` sections must stay in sync with claude_loop.yaml
#       and claude_loop_quick.yaml.
#       Allowed `defaults`/`steps[]` override keys (string-typed):
#         model, effort, system_prompt, append_system_prompt

command:
  executable: claude
  prompt_flag: -p
  args:
    - --dangerously-skip-permissions
    - --disallowedTools "AskUserQuestion"

defaults:
  model: sonnet
  effort: medium

steps:
  - name: issue_plan
    prompt: /issue_plan
    model: opus
    effort: high
