# NOTE: --workflow auto uses steps[1:] of this file. steps[0] must be /issue_plan.
#       The `command` / `defaults` sections must stay in sync with
#       claude_loop.yaml, claude_loop_issue_plan.yaml, and
#       claude_loop_scout.yaml.
#       Allowed `defaults`/`steps[]` override keys (string-typed):
#         model, effort, system_prompt, append_system_prompt

command:
  executable: claude
  prompt_flag: -p
  args:
    - --dangerously-skip-permissions
    - --disallowedTools "AskUserQuestion"

defaults:
  model: sonnet
  effort: medium

steps:
  - name: issue_plan
    prompt: /issue_plan
    model: opus
    effort: high

  - name: quick_impl
    prompt: /quick_impl
    effort: high
    continue: true

  - name: quick_doc
    prompt: /quick_doc
    effort: low
    continue: true
