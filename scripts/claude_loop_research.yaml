# NOTE: --workflow research で起動する 8 step workflow（実装前に調査・実験を正式 step として挟む）。
#       --workflow auto で選択される条件: ROUGH_PLAN.md frontmatter が workflow: research の場合。
#       The `command` / `defaults` sections must stay in sync with
#       claude_loop.yaml, claude_loop_quick.yaml, claude_loop_issue_plan.yaml,
#       claude_loop_scout.yaml, and claude_loop_question.yaml.
#       Allowed `defaults`/`steps[]` override keys (string-typed):
#         model, effort, system_prompt, append_system_prompt

command:
  executable: claude
  prompt_flag: -p
  args:
    - --dangerously-skip-permissions
    - --disallowedTools "AskUserQuestion"

defaults:
  model: sonnet
  effort: medium

steps:
  - name: issue_plan
    prompt: /issue_plan
    model: opus
    effort: high

  - name: split_plan
    prompt: /split_plan
    model: opus
    effort: high

  - name: research_context
    prompt: /research_context
    model: opus
    effort: high

  - name: experiment_test
    prompt: /experiment_test
    model: opus
    effort: high

  - name: imple_plan
    prompt: /imple_plan
    model: opus
    effort: high

  - name: wrap_up
    prompt: /wrap_up
    continue: true

  - name: write_current
    prompt: /write_current

  - name: retrospective
    prompt: /retrospective
    model: opus
